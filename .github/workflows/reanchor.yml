name: Weekly Re-anchor

# Periodic full-history rebuild that repairs STATE DRIFT — corruption living only
# in accumulated persisted state (e.g. the case-fold class), not in the source.
# Each run rebuilds ONE fund's networks from epoch into a candidate, gates each
# against the independent /v4/assets supply, and atomically replaces stored state
# only where the candidate is no worse. See _local/periodic-reanchor-design.md.
#
# Staggered one fund per night (Mon/Tue/Wed) to stay under rwa.xyz's 120 req/hr:
# a full rebuild is far heavier than the nightly incremental (USYC ETH alone is
# ~40 pages). Runs at 05:00 UTC — a different rolling hour than the 07:00 nightly.
#
# NOT scheduled: OUSG (still on the Etherscan/blocked path — add once its
# multi-chain cutover lands) and USDY (~1.18M-row Solana history exceeds the
# all-or-nothing backfill; needs chunked backfill first — the mode aborts it).

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday    → BUIDL
    - cron: '0 5 * * 2'   # Tuesday   → USTB
    - cron: '0 5 * * 3'   # Wednesday → USYC
  workflow_dispatch:
    inputs:
      fund:
        description: 'Fund to re-anchor (buidl | ustb | usyc)'
        required: true
        default: buidl

# Share the nightly classify concurrency group: re-anchor and the nightly
# incremental write the same tables and must never run concurrently. Same-night
# firings queue (either order is safe — re-anchor is a full rebuild).
concurrency:
  group: classify
  cancel-in-progress: false

jobs:
  reanchor:
    runs-on: ubuntu-latest
    # A full-history rebuild of the heaviest fund (USYC) is slower than the
    # nightly incremental; give it room.
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve fund from schedule (or dispatch input)
        id: fund
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FUND="${{ github.event.inputs.fund }}"
          else
            case "${{ github.event.schedule }}" in
              "0 5 * * 1") FUND=buidl ;;
              "0 5 * * 2") FUND=ustb ;;
              "0 5 * * 3") FUND=usyc ;;
              *) echo "::error::unmapped schedule '${{ github.event.schedule }}'"; exit 1 ;;
            esac
          fi
          echo "Re-anchoring fund: $FUND"
          echo "fund=$FUND" >> "$GITHUB_OUTPUT"

      - name: Run re-anchor
        run: npm run classify
        env:
          REANCHOR: ${{ steps.fund.outputs.fund }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          RWA_API_KEY: ${{ secrets.RWA_API_KEY }}
